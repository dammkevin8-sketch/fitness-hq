<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fitness-HQ · Isilay &amp; Kevin · KW 31</title>
<meta name="theme-color" content="#101a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness-HQ">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#f4f6fb; --surface:#fbfcff; --card:#ffffff;
  --ink:#0e1220; --ink2:#4c5468; --muted:#8b91a3;
  --grid:#e5e8f0; --baseline:#c9cedb; --border:rgba(14,18,32,.08);
  --kevin:#2a78d6; --kevin-soft:#e6f0fc; --kevin-deep:#1c5cab;
  --kevin-grad:linear-gradient(135deg,#4aa0ff 0%,#2a78d6 55%,#4a3aa7 130%);
  --isilay:#e87ba4; --isilay-soft:#fdeef4; --isilay-deep:#c2416f;
  --isilay-grad:linear-gradient(135deg,#f7b1cb 0%,#e87ba4 55%,#c2416f 130%);
  --energy:#eb6834; --energy-grad:linear-gradient(135deg,#ffb03a,#eb6834);
  --good:#0ca30c; --good-text:#006300; --good-grad:linear-gradient(135deg,#3fc63f,#0ca30c);
  --warn:#fab219; --crit:#d03b3b;
  --hero-grad:linear-gradient(120deg,#101a2e 0%,#1c3a66 55%,#5a2947 100%);
  --radius:20px; --radius-sm:14px;
  --shadow:0 2px 6px rgba(14,18,32,.05),0 12px 32px rgba(14,18,32,.09);
  --shadow-pop:0 4px 14px rgba(42,120,214,.28);
  color-scheme: light;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#0c0e14; --surface:#161923; --card:#1a1e2a;
    --ink:#f4f5f9; --ink2:#b7bccb; --muted:#818799;
    --grid:#272c3a; --baseline:#3a4052; --border:rgba(255,255,255,.09);
    --kevin:#3987e5; --kevin-soft:#182742; --kevin-deep:#86b6ef;
    --isilay:#d55181; --isilay-soft:#3a1f2b; --isilay-deep:#f0a3c0;
    --good-text:#0ca30c;
    --hero-grad:linear-gradient(120deg,#0b1322 0%,#173056 55%,#4a2038 100%);
    --shadow:0 2px 6px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.35);
    color-scheme: dark;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh; padding-bottom:110px;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;font-size:1rem;color:var(--ink)}
h1,h2,h3{line-height:1.25}

/* ---------- Header (Hero-Band) ---------- */
.app-header{
  background:var(--hero-grad); color:#fff;
  padding:22px max(16px,calc((100% - 760px)/2)) 20px;
  display:flex; align-items:center; gap:13px;
  border-radius:0 0 26px 26px;
  box-shadow:0 10px 30px rgba(16,26,46,.25);
  margin-bottom:16px;
}
.app-header .logo{
  width:48px;height:48px;border-radius:16px;flex:none;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.22);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.app-header h1{font-size:1.3rem;font-weight:900;letter-spacing:-.01em}
.app-header .sub{font-size:.78rem;color:rgba(255,255,255,.75)}
.wk-badge{margin-left:auto;font-size:.72rem;font-weight:800;color:#fff;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
  border-radius:14px;padding:8px 13px;text-align:center;backdrop-filter:blur(6px)}

/* ---------- Layout ---------- */
.view{max-width:760px;margin:0 auto;padding:0 14px 24px;display:none}
.view.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:17px;margin-bottom:14px}
.card h2{font-size:1rem;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h2 .hint{font-size:.72rem;font-weight:600;color:var(--muted);margin-left:auto}
.section-label{font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px}

/* ---------- Person switch ---------- */
.person-switch{display:flex;gap:10px;margin:2px 0 14px}
.person-switch button{
  flex:1;padding:13px 8px;border-radius:16px;font-size:1rem;font-weight:800;
  background:var(--card);border:2px solid var(--border);color:var(--ink2);
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s;
  box-shadow:var(--shadow);
}
.person-switch button:active{transform:scale(.97)}
.person-switch button.on-kevin{background:var(--kevin-grad);border-color:transparent;color:#fff;box-shadow:var(--shadow-pop)}
.person-switch button.on-isilay{background:var(--isilay-grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(232,123,164,.35)}

/* ---------- Day chips ---------- */
.day-chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
.day-chips::-webkit-scrollbar{display:none}
.day-chip{
  flex:1;min-width:46px;padding:9px 2px;border-radius:14px;text-align:center;
  background:var(--card);border:2px solid var(--border);transition:all .15s;
}
.day-chip:active{transform:scale(.95)}
.day-chip .dw{font-size:.78rem;font-weight:800;color:var(--ink2)}
.day-chip .dn{font-size:.64rem;color:var(--muted)}
.day-chip .dot{width:6px;height:6px;border-radius:99px;margin:4px auto 0;background:transparent}
.day-chip.today .dw{color:var(--good-text)}
.day-chip.sel.p-kevin{border-color:var(--kevin);background:var(--kevin-soft);box-shadow:0 3px 10px rgba(42,120,214,.18)}
.day-chip.sel.p-isilay{border-color:var(--isilay);background:var(--isilay-soft);box-shadow:0 3px 10px rgba(232,123,164,.2)}
.day-chip .dot.full{background:var(--good)}
.day-chip .dot.part{background:var(--energy)}

/* ---------- Day hero (dunkle Hero-Karte) ---------- */
.card:has(.day-hero){
  background:var(--hero-grad); border:none; color:#fff;
  --kevin:#4aa0ff; --isilay:#f7a3c4; --grid:rgba(255,255,255,.16);
}
.day-hero{display:flex;align-items:center;gap:16px}
.ring-wrap{position:relative;width:86px;height:86px;flex:none}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
.ring-wrap .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-wrap .ring-label b{font-size:1.25rem;font-weight:900;letter-spacing:-.02em}
.ring-wrap .ring-label span{font-size:.62rem;color:inherit;opacity:.65}
.day-hero .meta{flex:1}
.day-hero .meta .title{font-weight:800;font-size:1.08rem;margin-top:2px}
.day-hero .meta .desc{font-size:.8rem;opacity:.8;margin-top:2px}
.day-hero .meta .kcal-line{font-size:.8rem;opacity:.95;margin-top:7px}
.badge{display:inline-block;font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:99px;margin:2px 4px 0 0}
.badge.b-kevin{background:var(--kevin-soft);color:var(--kevin-deep)}
.badge.b-isilay{background:var(--isilay-soft);color:var(--isilay-deep)}
.badge.b-good{background:rgba(12,163,12,.15);color:var(--good-text)}
.card:has(.day-hero) .badge.b-kevin{background:rgba(255,255,255,.16);color:#cfe4ff}
.card:has(.day-hero) .badge.b-isilay{background:rgba(255,255,255,.16);color:#ffd6e6}
.card:has(.day-hero) .badge.b-good{background:rgba(63,198,63,.25);color:#a4f0a4}

/* ---------- Check items ---------- */
.check-item{
  display:flex;align-items:flex-start;gap:12px;padding:12px 4px;
  border-bottom:1px solid var(--grid);
}
.check-item:last-child{border-bottom:none}
.check-item:active .checkbox{transform:scale(.9)}
.checkbox{
  width:28px;height:28px;border-radius:10px;flex:none;margin-top:1px;
  border:2.5px solid var(--baseline);display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;transition:all .18s;background:transparent;
}
.check-item.done .checkbox{background:var(--good-grad);border-color:transparent;box-shadow:0 3px 8px rgba(12,163,12,.3)}
.check-item .ci-body{flex:1;min-width:0}
.check-item .ci-title{font-size:.92rem;font-weight:700}
.check-item.done .ci-title{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1.5px}
.check-item .ci-sub{font-size:.76rem;color:var(--ink2);margin-top:1px}
.check-item .ci-macro{font-size:.72rem;font-weight:800;color:var(--muted);white-space:nowrap;margin-top:3px}
.check-item .ci-emoji{font-size:1.15rem;margin-top:1px}

/* ---------- Training ---------- */
.training-card{border:2px solid var(--border);border-radius:16px;padding:13px;margin-top:8px;background:var(--surface)}
.training-card.t-hard{border-color:var(--kevin)}
.training-card.t-isi{border-color:var(--isilay)}
.training-head{display:flex;align-items:center;gap:10px}
.t-toggle{font-size:.8rem;font-weight:800;color:var(--kevin-deep);padding:4px 0 0}
.t-isi .t-toggle{color:var(--isilay-deep)}
.exercise-list{margin-top:8px;display:none}
.exercise-list.open{display:block}
.ex-row{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-top:1px dashed var(--grid);font-size:.82rem}
.ex-row .ex-name{font-weight:700;flex:1}
.ex-row .ex-rx{color:var(--ink2);white-space:normal;text-align:right;max-width:58%}
.log-input{
  width:100%;margin-top:10px;padding:10px 12px;border-radius:12px;
  border:2px solid var(--grid);background:var(--card);font-size:.85rem;
}
.log-input:focus{outline:none;border-color:var(--kevin)}
.pull-test{display:flex;gap:8px;align-items:center;margin-top:10px;font-size:.82rem;font-weight:700}
.pull-test input{width:72px;padding:9px;border-radius:12px;border:2px solid var(--grid);background:var(--card);text-align:center;font-weight:900;font-size:1rem}
.pull-test input:focus{outline:none;border-color:var(--kevin)}
.asthma-note{margin-top:10px;font-size:.75rem;color:var(--ink2);background:var(--isilay-soft);border-radius:12px;padding:9px 11px}

/* ---------- Tracker ---------- */
.tracker-row{display:flex;gap:12px}
.tracker{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;min-width:0}
.tracker .tk-head{display:flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.tracker .tk-val{font-size:1.65rem;font-weight:900;letter-spacing:-.02em;margin:7px 0 2px}
.tracker .tk-val small{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:0}
.tracker .tk-goal{font-size:.68rem;color:var(--muted)}
.tk-bar{height:9px;border-radius:99px;background:var(--grid);margin:9px 0;overflow:hidden}
.tk-bar i{display:block;height:100%;border-radius:99px;transition:width .3s;background:var(--kevin-grad)}
.tk-btns{display:flex;gap:8px;margin-top:4px}
.tk-btns button{
  flex:1;padding:9px 0;border-radius:12px;font-size:1rem;font-weight:900;
  background:var(--surface);border:2px solid var(--grid);
}
.tk-btns button:last-child{background:var(--kevin-grad);color:#fff;border-color:transparent;box-shadow:var(--shadow-pop);font-size:.9rem}
.tk-btns button:active{transform:scale(.95)}
.steps-input{width:100%;padding:10px 12px;margin-top:8px;border-radius:12px;border:2px solid var(--grid);background:var(--surface);font-weight:800}
.steps-input:focus,.weight-quick input:focus{outline:none;border-color:var(--kevin)}
.weight-quick{display:flex;gap:8px;margin-top:8px}
.weight-quick input{flex:1;min-width:0;padding:10px 12px;border-radius:12px;border:2px solid var(--grid);background:var(--surface);font-weight:800}
.weight-quick button{padding:10px 16px;border-radius:12px;font-weight:900;color:#fff;box-shadow:var(--shadow-pop)}
.smoke-badge{display:flex;align-items:center;gap:12px;margin-top:4px}
.smoke-badge .sm-num{font-size:2rem;font-weight:900;letter-spacing:-.02em;background:var(--good-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.smoke-badge .sm-txt{font-size:.9rem;font-weight:800;color:var(--ink)}
.smoke-fact{margin-top:8px;font-size:.82rem;line-height:1.5;color:var(--ink2);background:var(--isilay-soft);border-radius:12px;padding:10px 12px}

/* ---------- Week view ---------- */
.week-grid{display:grid;grid-template-columns:52px 1fr 1fr;gap:9px;align-items:center}
.week-grid .wg-day{font-size:.8rem;font-weight:800;color:var(--ink2);text-align:center}
.week-grid .wg-day small{display:block;font-weight:500;color:var(--muted);font-size:.64rem}
.wg-cell{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:9px;text-align:center;box-shadow:var(--shadow)}
.wg-cell:active{transform:scale(.97)}
.wg-cell .wg-pct{font-weight:900;font-size:1rem}
.wg-cell .wg-info{font-size:.62rem;color:var(--muted);margin-top:1px}
.wg-cell .wg-mini{height:6px;border-radius:99px;background:var(--grid);margin-top:7px;overflow:hidden}
.wg-cell .wg-mini i{display:block;height:100%;border-radius:99px}
.wg-head{font-size:.78rem;font-weight:900;text-align:center;padding:4px 0}

/* ---------- Stat tiles / charts ---------- */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px}
.stat-tile .st-label{font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:flex;gap:6px;align-items:center}
.stat-tile .st-value{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;margin-top:6px}
.stat-tile .st-value small{font-size:.8rem;font-weight:700;color:var(--muted);letter-spacing:0}
.stat-tile .st-sub{font-size:.68rem;color:var(--muted);margin-top:3px}
.chart-wrap{width:100%;overflow:hidden}
.chart-wrap svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:14px;font-size:.75rem;color:var(--ink2);margin-top:10px;flex-wrap:wrap}
.legend .lg{display:flex;align-items:center;gap:6px;font-weight:600}
.legend .sw{width:10px;height:10px;border-radius:3px}
.vs-bar{display:flex;height:18px;border-radius:99px;overflow:hidden;margin-top:8px;background:var(--grid)}
.vs-bar .vk{background:var(--kevin-grad)}
.vs-bar .vi{background:var(--isilay-grad);border-left:3px solid var(--card)}
.vs-names{display:flex;justify-content:space-between;font-size:.78rem;font-weight:800;margin-top:8px}

/* ---------- Shopping ---------- */
.shop-summary{display:flex;gap:12px;margin-bottom:14px}
.shop-cat{margin-bottom:12px}
.shop-cat-head{
  display:flex;align-items:center;gap:8px;padding:13px 15px;border-radius:16px;
  background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);width:100%;text-align:left;
}
.shop-cat-head:active{transform:scale(.99)}
.shop-cat-head .sc-title{font-weight:800;font-size:.9rem;flex:1}
.shop-cat-head .sc-count{font-size:.72rem;font-weight:700;color:var(--muted)}
.shop-cat-head .sc-sum{font-size:.78rem;font-weight:800;color:var(--good-text)}
.shop-items{padding:4px 6px;display:none}
.shop-cat.open .shop-items{display:block}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--grid)}
.shop-item:last-child{border-bottom:none}
.shop-item .si-name{flex:1;font-size:.88rem;font-weight:600}
.shop-item.done .si-name{color:var(--muted);text-decoration:line-through;font-weight:400}
.shop-item .si-who{font-size:.6rem;font-weight:900;padding:3px 7px;border-radius:7px}
.si-who.w-k{background:var(--kevin-soft);color:var(--kevin-deep)}
.si-who.w-i{background:var(--isilay-soft);color:var(--isilay-deep)}
.si-who.w-b{background:rgba(12,163,12,.12);color:var(--good-text)}
.shop-item .si-price{
  width:76px;padding:8px;border-radius:10px;border:2px solid var(--grid);
  background:var(--surface);text-align:right;font-size:.82rem;font-weight:700;
}
.shop-item .si-price:focus{outline:none;border-color:var(--kevin)}
.price-note{font-size:.72rem;color:var(--muted);margin:2px 4px 12px}

/* ---------- Mehr ---------- */
.settings-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--grid);font-size:.88rem}
.settings-row:last-child{border-bottom:none}
.settings-row label{flex:1;font-weight:700}
.settings-row input[type=number],.settings-row input[type=date]{
  width:118px;padding:9px 11px;border-radius:12px;border:2px solid var(--grid);background:var(--surface);font-weight:700
}
.settings-row input:focus{outline:none;border-color:var(--kevin)}
.btn{display:block;width:100%;padding:13px;border-radius:14px;font-weight:800;font-size:.92rem;text-align:center;margin-top:10px}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--kevin-grad);color:#fff;box-shadow:var(--shadow-pop)}
.btn.pink{background:var(--isilay-grad);color:#fff}
.btn.ghost{background:var(--card);border:2px solid var(--grid);color:var(--ink2)}
.btn.danger{background:transparent;border:2px solid var(--crit);color:var(--crit)}
.info-list{font-size:.82rem;color:var(--ink2);line-height:1.55}
.info-list li{margin-left:18px;margin-bottom:7px}

/* ---------- Wochen-Check (Feedback) ---------- */
.fb-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px dashed var(--grid);font-size:.84rem}
.fb-row .fb-name{flex:1;font-weight:600;min-width:0}
.fb-btn{padding:7px 11px;border-radius:10px;border:2px solid var(--grid);font-size:.72rem;font-weight:800;background:var(--surface);color:var(--muted);white-space:nowrap}
.fb-btn:active{transform:scale(.94)}
.fb-btn.on-pos{background:var(--good-grad);border-color:transparent;color:#fff;box-shadow:0 3px 8px rgba(12,163,12,.3)}
.fb-btn.on-neg{background:var(--energy-grad);border-color:transparent;color:#fff;box-shadow:0 3px 8px rgba(235,104,52,.3)}
.fb-sec{font-size:.72rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 2px}
.fb-count{font-size:.72rem;font-weight:700;color:var(--good-text)}

/* ---------- Celebration ---------- */
.celebrate{
  background:var(--energy-grad);color:#fff;
  border:none;border-radius:var(--radius);padding:15px 17px;
  margin-bottom:14px;font-size:.9rem;font-weight:700;display:flex;gap:10px;align-items:center;
  box-shadow:0 6px 18px rgba(235,104,52,.35);
}

/* ---------- Rezept-Modal ---------- */
#recipe-overlay{position:fixed;inset:0;background:rgba(10,14,24,.55);backdrop-filter:blur(3px);z-index:70;display:none;align-items:flex-end;justify-content:center}
#recipe-overlay.open{display:flex}
#recipe-sheet{position:relative;background:var(--card);width:100%;max-width:640px;max-height:86vh;overflow-y:auto;border-radius:26px 26px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.3);-webkit-overflow-scrolling:touch}
@media(min-width:660px){#recipe-overlay{align-items:center}#recipe-sheet{border-radius:26px;max-height:80vh}}
#recipe-close{position:sticky;top:0;float:right;width:34px;height:34px;border-radius:12px;background:var(--surface);border:1.5px solid var(--grid);font-weight:900;font-size:.95rem;color:var(--ink2);z-index:2}
.rc-title{font-size:1.15rem;font-weight:900;letter-spacing:-.01em;padding-right:44px}
.rc-meta{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px}
.rc-meta span{font-size:.7rem;font-weight:800;padding:5px 11px;border-radius:99px;background:var(--kevin-soft);color:var(--kevin-deep)}
.rc-isilay .rc-meta span{background:var(--isilay-soft);color:var(--isilay-deep)}
.rc-sec{font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
.rc-zutaten li{margin-left:20px;padding:3px 0;font-size:.88rem}
.rc-steps li{margin-left:20px;padding:5px 0;font-size:.88rem;line-height:1.5}
.rc-steps li::marker{font-weight:900;color:var(--kevin-deep)}

/* ---------- Toast ---------- */
#toast{
  position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:99px;
  font-size:.85rem;font-weight:700;opacity:0;pointer-events:none;transition:all .25s;z-index:60;
  max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Bottom nav (schwebende Leiste) ---------- */
.bottom-nav{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:50;
  width:min(560px,calc(100% - 20px));
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  box-shadow:0 10px 34px rgba(14,18,32,.18);
  display:flex;justify-content:space-around;
  padding:8px;
}
.bottom-nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:.6rem;font-weight:800;color:var(--muted);padding:7px 0;border-radius:17px;transition:all .15s;
}
.bottom-nav button .nv-ico{font-size:1.3rem;line-height:1.15}
.bottom-nav button.active{color:var(--kevin-deep);background:var(--kevin-soft)}
@media(min-width:600px){ .bottom-nav button{font-size:.7rem} }

/* Checkliste eines Tages: Mahlzeiten + Training */
function dayItems(person, dayKey){
  const d = PLAN[person].days[dayKey]; if(!d) return [];
  const items = d.meals.map(m=>m.id);
  if(d.training) items.push("training");
  return items;
}
function isChecked(person, dayKey, id){
  return !!(S.checks[person][dayKey] && S.checks[person][dayKey][id]);
}
function dayProgress(person, dayKey){
  const items = dayItems(person, dayKey);
  const done = items.filter(id=>isChecked(person,dayKey,id)).length;
  return {done, total:items.length, pct: items.length? Math.round(done/items.length*100):0};
}
function toggleCheck(person, dayKey, id){
  if(!S.checks[person][dayKey]) S.checks[person][dayKey] = {};

  save(); cloudSet("checks/"+person+"/"+dayKey+"/"+id, S.checks[person][dayKey][id]);

  if(p.pct===100) toast(person==="kevin" ? "💪 Kevin: Tag komplett! Stark!" : "🌸 Isilay: Tag komplett! Großartig!");
  render();
}

function dayPoints(person, dayKey){
  const d = PLAN[person].days[dayKey]; if(!d) return 0;
  let pts = 0;
  d.meals.forEach(m=>{ if(isChecked(person,dayKey,m.id)) pts += 10; });
  if(d.training && isChecked(person,dayKey,"training")) pts += 30;
  const goal = person==="kevin" ? S.goals.kevinWater : S.goals.isilayWater;
  if((S.water[person][dayKey]||0) >= goal) pts += 15;
  if(person==="isilay" && (S.steps[dayKey]||0) >= S.goals.steps) pts += 15;
  if(S.weight[person][dayKey]) pts += 5;
  return pts;
}

    const p = dayProgress(person, past[i].key);
    if(p.pct>=80){ n++; } else if(past[i].key===t && p.pct<80){ continue; } else break;

}

function recipeFor(person, dayKey, mealId){
  const map = MEAL_RECIPE[person] && MEAL_RECIPE[person][dayKey];
  const key = map && map[mealId];
  return key && RECIPES[person][key] ? key : null;
}

function ringSVG(pct, color, size=74, sw=7){
  const r = (size-sw)/2, c = 2*Math.PI*r;
  const off = c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="${pct} % erledigt">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--grid)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

/* ================= FORTSCHRITT ================= */
function svgLineChart(){
  const Wd = 640, H = 260, padL = 40, padR = 74, padT = 18, padB = 30;
  const pts = p => WEEK.map((w,i)=> S.weight[p][w.key] ? {i, v:S.weight[p][w.key], dn:w.dn, dw:w.dw} : null).filter(Boolean);
  const kv = pts("kevin"), iv = pts("isilay");
  const all = [...kv.map(d=>d.v), ...iv.map(d=>d.v)];
  if(!all.length) return `<div class="ci-sub" style="font-size:.85rem">Noch keine Gewichtseinträge. Kevin wiegt sich Mo, Mi, Fr &amp; So morgens – die Kurve entsteht von allein. 📉</div>`;
  let lo = Math.floor(Math.min(...all))-1, hi = Math.ceil(Math.max(...all))+1;
  if(hi-lo<4){ const m=(hi+lo)/2; lo=m-2; hi=m+2; }
  const X = i => padL + i*(Wd-padL-padR)/6;
  const Y = v => padT + (hi-v)*(H-padT-padB)/(hi-lo);
  let grid = "", labels = "";
  const step = (hi-lo) > 8 ? 2 : 1;
  for(let g=lo; g<=hi; g+=step){
    grid += `<line x1="${padL}" y1="${Y(g)}" x2="${Wd-padR}" y2="${Y(g)}" stroke="var(--grid)" stroke-width="1"/>`;
    labels += `<text x="${padL-7}" y="${Y(g)+4}" text-anchor="end" font-size="11" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${g}</text>`;
  }
  let xlab = WEEK.map((w,i)=>`<text x="${X(i)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted)">${w.dw}</text>`).join("");
  const line = (data,color,name) => {
    if(!data.length) return "";
    const path = data.map((d,j)=>(j?"L":"M")+X(d.i)+" "+Y(d.v)).join(" ");
    const dots = data.map(d=>`<circle cx="${X(d.i)}" cy="${Y(d.v)}" r="4.5" fill="${color}" stroke="var(--card)" stroke-width="2"><title>${name} · ${d.dw} ${d.dn}: ${String(d.v).replace(".",",")} kg</title></circle>`).join("");
    const last = data[data.length-1];
    const lbl = `<text x="${X(last.i)+10}" y="${Y(last.v)+4}" font-size="12" font-weight="700" fill="var(--ink)">${name} ${String(last.v).replace(".",",")}</text>`;
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`+dots+lbl;
  };
  return `<div class="chart-wrap"><svg viewBox="0 0 ${Wd} ${H}" role="img" aria-label="Gewichtsverlauf">
    ${grid}${labels}${xlab}
    <line x1="${padL}" y1="${H-padB}" x2="${Wd-padR}" y2="${H-padB}" stroke="var(--baseline)" stroke-width="1"/>
    ${line(kv,"var(--kevin)","Kevin")}${line(iv,"var(--isilay)","Isilay")}
  </svg></div>
  <div class="legend"><span class="lg"><span class="sw" style="background:var(--kevin)"></span>Kevin (Ziel: 80 kg)</span><span class="lg"><span class="sw" style="background:var(--isilay)"></span>Isilay</span></div>`;
}
function svgCompletionChart(){
  const Wd = 640, H = 210, padL = 40, padR = 14, padT = 14, padB = 30;
  const bw = 16, gap = 2;
  const X = i => padL + (i+0.5)*(Wd-padL-padR)/7;
  const Y = v => padT + (100-v)*(H-padT-padB)/100;
  let grid = "", labels = "";
  [0,25,50,75,100].forEach(g=>{
    grid += `<line x1="${padL}" y1="${Y(g)}" x2="${Wd-padR}" y2="${Y(g)}" stroke="var(--grid)" stroke-width="1"/>`;
    labels += `<text x="${padL-7}" y="${Y(g)+4}" text-anchor="end" font-size="11" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${g}</text>`;
  });
  let bars = "", xlab = "";
  WEEK.forEach((w,i)=>{
    const kp = dayProgress("kevin",w.key).pct, ip = dayProgress("isilay",w.key).pct;
    const x = X(i);
    const bar = (px,pct,color,name)=>{
      const y = Y(pct), h = Math.max(0,(H-padB)-y);
      if(h<=0) return "";
      return `<rect x="${px}" y="${y}" width="${bw}" height="${h}" rx="4" fill="${color}"><title>${name} · ${w.dw}: ${pct} % erledigt</title></rect>`;
    };
    bars += bar(x-bw-gap/2, kp, "var(--kevin)", "Kevin");
    bars += bar(x+gap/2, ip, "var(--isilay)", "Isilay");
    xlab += `<text x="${x}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted)">${w.dw}</text>`;
  });
  return `<div class="chart-wrap"><svg viewBox="0 0 ${Wd} ${H}" role="img" aria-label="Tages-Erfüllung in Prozent">
    ${grid}${labels}${xlab}
    <line x1="${padL}" y1="${H-padB}" x2="${Wd-padR}" y2="${H-padB}" stroke="var(--baseline)" stroke-width="1"/>
    ${bars}
  </svg></div>
  <div class="legend"><span class="lg"><span class="sw" style="background:var(--kevin)"></span>Kevin</span><span class="lg"><span class="sw" style="background:var(--isilay)"></span>Isilay</span><span class="lg" style="color:var(--muted)">100 % = alle Mahlzeiten + Training abgehakt</span></div>`;
}
function renderProgress(){
  const kPts = weekPoints("kevin"), iPts = weekPoints("isilay");
  const kSt = streak("kevin"), iSt = streak("isilay");
  const sd = smokeDays();
  const total = kPts+iPts;
  const kevW = Object.entries(S.weight.kevin).sort();
  const kevAvg = kevW.length ? (kevW.reduce((a,[,v])=>a+v,0)/kevW.length) : null;

  let html = `
  <div class="stat-row">
    <div class="stat-tile"><div class="st-label">🏆 Team-Punkte</div><div class="st-value">${total}</div>
      <div class="st-sub">Mahlzeit 10 · Training 30 · Wasser 15 · Schritte 15 · Wiegen 5</div></div>
    <div class="stat-tile"><div class="st-label">🔥 Serien</div>
      <div class="st-value">${kSt}<small> Kevin</small> · ${iSt}<small> Isilay</small></div>
      <div class="st-sub">Tage in Folge mit ≥ 80 % erledigt</div></div>
    <div class="stat-tile"><div class="st-label">🚭 Rauchfrei</div>
      <div class="st-value">${sd===null?"–":sd}<small> Tage</small></div>
      <div class="st-sub">${sd===null?"Startdatum unter „Mehr“ setzen":"Isilays größter Sieg 💚"}</div></div>
    <div class="stat-tile"><div class="st-label">⚖️ Kevins Wochenmittel</div>
      <div class="st-value">${kevAvg? String(kevAvg.toFixed(1)).replace(".",","):"–"}<small> kg</small></div>
      <div class="st-sub">Nur das Mittel zählt – ±1 kg am Tag ist Wasser</div></div>
  </div>

  <div class="card"><h2>🤝 Wochen-Duell <span class="hint">freundschaftlich!</span></h2>
    <div class="vs-bar">
      <div class="vk" style="width:${total? Math.round(kPts/total*100):50}%"></div>
      <div class="vi" style="flex:1"></div>
    </div>
    <div class="vs-names"><span style="color:var(--kevin-deep)">💪 Kevin · ${kPts} P.</span><span style="color:var(--isilay-deep)">${iPts} P. · Isilay 🌸</span></div>
    <div class="ci-sub" style="margin-top:8px">${kPts===iPts?"Absolut gleichauf – perfektes Team!":(kPts>iPts?"Kevin führt – Isilay, hol dir die Punkte beim nächsten Training! 😄":"Isilay führt – Kevin, die Küche wartet! 😄")}</div>
  </div>

  <div class="card"><h2>⚖️ Gewichtsverlauf</h2>${svgLineChart()}</div>
  <div class="card"><h2>✅ Tages-Erfüllung</h2>${svgCompletionChart()}</div>`;

  /* Wochen-Check */
  const f = fb(), fc = fbCounts();
  html += `<div class="card"><h2>📝 Wochen-Check <span class="hint">fließt in den nächsten Plan ein</span></h2>
    <div class="ci-sub">Bewertet die Gerichte der Woche (👍 gerne wieder · 👎 austauschen) und entscheidet bei den Übungen: behalten oder wechseln? Das Sonntags-Update baut den neuen Plan genau daraus.</div>
    ${fc.m+fc.e>0?`<div class="fb-count" style="margin-top:6px">✅ ${fc.m} Gerichte &amp; ${fc.e} Übungen bewertet</div>`:""}
    <button class="btn ghost" onclick="fbOpen=!fbOpen;render()">${fbOpen?"▲ Wochen-Check zuklappen":"▼ Wochen-Check öffnen"}</button>`;
  if(fbOpen){
    ["kevin","isilay"].forEach(p=>{
      html += `<div class="fb-sec">${PLAN[p].emoji} ${PLAN[p].name}s Gerichte</div>`;
      FB_LISTS.meals[p].forEach((m,i)=>{
        const r = f.mealRatings[m.n]||0;
        html += `<div class="fb-row"><span class="fb-name">${m.e} ${esc(m.n)}</span>
          <button class="fb-btn ${r===1?"on-pos":""}" onclick="rateMeal('${p}',${i},1)">👍</button>
          <button class="fb-btn ${r===-1?"on-neg":""}" onclick="rateMeal('${p}',${i},-1)">👎</button></div>`;
      });
    });
    ["kevin","isilay"].forEach(p=>{
      html += `<div class="fb-sec">${PLAN[p].emoji} ${PLAN[p].name}s Übungen</div>`;
      FB_LISTS.ex[p].forEach((n,i)=>{
        const r = f.exRatings[n]||"";
        html += `<div class="fb-row"><span class="fb-name">${esc(n)}</span>
          <button class="fb-btn ${r==="keep"?"on-pos":""}" onclick="rateEx('${p}',${i},'keep')">Behalten</button>
          <button class="fb-btn ${r==="change"?"on-neg":""}" onclick="rateEx('${p}',${i},'change')">Wechseln</button></div>`;
      });
    });
    html += `<div class="fb-sec">💬 Wünsche für nächste Woche</div>
    <textarea class="log-input" rows="2" placeholder="z. B. mehr Curry, weniger Fisch, neues Frühstück, lieber vormittags trainieren …" onchange="fb().wishes=this.value;save();cloudSet('feedback',S.feedback);toast('Gespeichert – fließt in den nächsten Plan ein')">${esc(f.wishes||"")}</textarea>`;
  }
  html += `</div>`;

  /* Klimmzug + Logs */
  html += `<div class="card"><h2>📝 Kevins Trainings-Protokoll</h2>
    <div class="ci-sub" style="margin-bottom:8px">🧗 Klimmzug-Test (Mi): <b>${S.pullTest!==""? S.pullTest+" Wdh.":"noch offen"}</b>${S.pullTest!==""? " · Fr: 3 Sätze à ~"+Math.max(1,Math.round(S.pullTest*0.4))+" Wdh.":""}</div>`;
  const logDays = WEEK.filter(w=>S.logs[w.key]);
  if(logDays.length){
    logDays.forEach(w=>{ html += `<div class="ex-row"><span class="ex-name">${w.dw} ${w.dn}</span><span class="ex-rx" style="white-space:normal;text-align:right">${esc(S.logs[w.key])}</span></div>`; });
  } else {
    html += `<div class="ci-sub">Noch keine Notizen – Zahlen aus den Kraft-Einheiten hier festhalten, das ist die Basis für Woche 2!</div>`;
  }
  html += `</div>`;
  $("#view-progress").innerHTML = html;
}

/* ================= EINKAUF ================= */
function shopKey(ci, ii){ return "s"+ci+"_"+ii; }
function renderShop(){
  let bought = 0, totalItems = 0, sum = 0;
  SHOPPING.forEach((c,ci)=>c.items.forEach((it,ii)=>{
    totalItems++;
    const st = S.shop[shopKey(ci,ii)];
    if(st && st.c) bought++;
    if(st && st.p) sum += Number(st.p)||0;
  }));
  let html = `
  <div class="shop-summary">
    <div class="stat-tile" style="flex:1"><div class="st-label">🛒 Gekauft</div><div class="st-value">${bought}<small> / ${totalItems}</small></div>
      <div class="tk-bar" style="margin-top:8px"><i style="width:${totalItems?Math.round(bought/totalItems*100):0}%;background:var(--good)"></i></div></div>
    <div class="stat-tile" style="flex:1"><div class="st-label">💶 Ausgegeben</div><div class="st-value" style="color:var(--good-text)">${fmtEur(sum)}</div>
      <div class="st-sub">${S.goals.budget>0? "Budget: "+fmtEur(S.goals.budget)+" · "+(sum<=S.goals.budget?"noch "+fmtEur(S.goals.budget-sum):"⚠️ "+fmtEur(sum-S.goals.budget)+" drüber") : "Budget unter „Mehr“ setzen"}</div></div>
  </div>
  <div class="price-note">💡 Preis beim Einkaufen eintragen (z. B. 2,49) – so seht ihr, was die Woche wirklich kostet. Einmal groß einkaufen reicht für die ganze Woche.</div>`;

  SHOPPING.forEach((c,ci)=>{
    let catSum = 0, catBought = 0;
    c.items.forEach((it,ii)=>{ const st=S.shop[shopKey(ci,ii)]; if(st&&st.c)catBought++; if(st&&st.p)catSum+=Number(st.p)||0; });
    const open = !!openCats[ci];
    html += `<div class="shop-cat ${open?"open":""}">
      <button class="shop-cat-head" onclick="openCats[${ci}]=!openCats[${ci}];render()">
        <span class="sc-title">${esc(c.cat)}</span>
        <span class="sc-count">${catBought}/${c.items.length}</span>
        ${catSum?`<span class="sc-sum">${fmtEur(catSum)}</span>`:""}
        <span>${open?"▲":"▼"}</span>
      </button>
      <div class="shop-items">`;
    c.items.forEach((it,ii)=>{
      const k = shopKey(ci,ii);
      const st = S.shop[k]||{};
      const name = Array.isArray(it)? it[0] : it;
      const w = Array.isArray(it)? it[1] : c.who;
      const whoTag = w==="k"?'<span class="si-who w-k">K</span>':(w==="i"?'<span class="si-who w-i">I</span>':'<span class="si-who w-b">K+I</span>');
      html += `<div class="shop-item ${st.c?"done":""}">
        <button class="checkbox ${st.c?"":""}" style="${st.c?"background:var(--good);border-color:var(--good)":""}" onclick="toggleShop('${k}')">✓</button>
        <span class="si-name">${esc(name)}</span>${whoTag}
        <input class="si-price" type="number" step="0.01" inputmode="decimal" placeholder="€" value="${st.p||""}"
          onchange="setPrice('${k}',this.value)">
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `<button class="btn ghost" onclick="resetShopping()">🔄 Liste für nächste Woche zurücksetzen (Preise bleiben gespeichert)</button>`;
  $("#view-shop").innerHTML = html;
}
function toggleShop(k){
  if(!S.shop[k]) S.shop[k] = {};
  S.shop[k].c = !S.shop[k].c; save(); cloudSet("shop/"+k, S.shop[k]); render();
}
function setPrice(k,v){
  if(!S.shop[k]) S.shop[k] = {};
  S.shop[k].p = v; save(); cloudSet("shop/"+k, S.shop[k]); render();
}
let resetShopArmed = false;
function resetShopping(){
  if(!resetShopArmed){ resetShopArmed = true; toast("Nochmal tippen zum Bestätigen – Häkchen werden entfernt"); setTimeout(()=>resetShopArmed=false, 3000); return; }
  Object.keys(S.shop).forEach(k=>{ if(S.shop[k]) S.shop[k].c = false; });
  save(); cloudSet("shop", S.shop); toast("🛒 Liste zurückgesetzt – Preise bleiben als Richtwert"); render();
}

/* ================= MEHR ================= */
function renderMore(){
  let html = `
  ${storageOk?"":`<div class="celebrate">⚠️ <span>In dieser Ansicht kann nicht dauerhaft gespeichert werden. Öffnet die App als Datei im Browser (Doppelklick auf <b>fitness-hq.html</b> in eurem Ordner) – dann bleibt alles erhalten. Zwischenstand könnt ihr unten als Backup sichern.</span></div>`}
  <div class="card"><h2>🎯 Ziele anpassen</h2>
    <div class="settings-row"><label>💧 Kevins Wasserziel (L)</label><input type="number" step="0.25" value="${S.goals.kevinWater}" onchange="S.goals.kevinWater=Number(this.value)||3;save();cloudSet('goals/kevinWater',S.goals.kevinWater);toast('Gespeichert')"></div>
    <div class="settings-row"><label>💧 Isilays Wasserziel (L)</label><input type="number" step="0.25" value="${S.goals.isilayWater}" onchange="S.goals.isilayWater=Number(this.value)||2;save();cloudSet('goals/isilayWater',S.goals.isilayWater);toast('Gespeichert')"></div>
    <div class="settings-row"><label>👟 Isilays Schrittziel</label><input type="number" step="500" value="${S.goals.steps}" onchange="S.goals.steps=Number(this.value)||10000;save();cloudSet('goals/steps',S.goals.steps);toast('Gespeichert')"></div>
    <div class="settings-row"><label>💶 Wochen-Einkaufsbudget (€)</label><input type="number" step="5" value="${S.goals.budget||""}" placeholder="z. B. 120" onchange="S.goals.budget=Number(this.value)||0;save();cloudSet('goals/budget',S.goals.budget);toast('Gespeichert')"></div>
    <div class="settings-row"><label>🚭 Isilay rauchfrei seit</label><input type="date" value="${S.smokeStart}" onchange="S.smokeStart=this.value;save();cloudSet('smokeStart',S.smokeStart);toast('💚 Zähler läuft!');"></div>
  </div>

  <div class="card"><h2>☁️ Echtzeit-Sync</h2>
    <div id="cloud-status-line" class="ci-sub" style="font-size:.85rem">${cloudStatusText()}</div>
    <div class="price-note" style="margin-top:8px">Gemeinsamer Haushalt: <b>Isilay &amp; Kevin</b>. Beide Handys, die diese App öffnen, teilen automatisch denselben Fortschritt – kein Login nötig.</div>
  </div>

  <div class="card"><h2>💾 Daten sichern &amp; übertragen</h2>
    <div class="ci-sub" style="margin-bottom:6px">Backup als Datei speichern – z. B. um den Stand aufs Handy oder den anderen PC mitzunehmen.</div>
    <button class="btn primary" onclick="exportData()">⬇️ Backup herunterladen (JSON)</button>
    <label class="btn ghost" style="cursor:pointer">⬆️ Backup einspielen<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
    <button class="btn danger" onclick="resetAll()">🗑️ Alle Daten zurücksetzen</button>
  </div>

  <div class="card"><h2>📖 Die Spielregeln der Woche</h2><ul class="info-list">
    <li><b>Kevin – Lean Bulk:</b> ~3.000 kcal/Tag, 145–150 g Protein. Ziel +0,25–0,5 kg/Woche. 2 Wochen kein Anstieg → +200 kcal; über 0,5 kg/Woche → −200 kcal.</li>
    <li><b>Kevin – Wiegen:</b> Mo, Mi, Fr, So morgens nüchtern. Nur das Wochenmittel zählt.</li>
    <li><b>Kevin – RIR 2:</b> Jeden Satz 2 Wiederholungen vor dem Versagen beenden. Sehnen brauchen Monate, keine Ego-Sätze!</li>
    <li><b>Isilay – kein Kalorienzählen:</b> Satt werden, Eiweiß, Gemüse, Bewegung die sich gut anfühlt. Läuft ein Tag anders: einfach bei der nächsten Mahlzeit weitermachen.</li>
    <li><b>Isilay – Asthma:</b> Nie ohne 10 Min Aufwärmen, Talk-Test, Spray griffbereit. Keine Kamille (Kreuzallergie), Allergie-Obst/-Gemüse nur gekocht.</li>
    <li><b>Gemeinsam:</b> Abendessen einmal kochen, zwei Teller – Kevins größer. Mi ist Prep-Tag 🔥, So ist Kevins Ruhetag &amp; Isilays Aktiv-Tag.</li>
  </ul>
  <div class="price-note" style="margin-top:8px">Richtwerte aus euren Wochenplänen KW 31 – keine medizinische Beratung.</div></div>`;
  $("#view-more").innerHTML = html;
}
function exportData(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fitness-hq-backup-"+todayKey()+".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("⬇️ Backup erstellt");
}
function importData(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{ S = Object.assign(defaultState(), JSON.parse(r.result)); save(); pushAll(); toast("✅ Backup geladen"); render(); }
    catch(e){ toast("❌ Datei konnte nicht gelesen werden"); }
  };
  r.readAsText(f);
}
let resetArmed = false;
function resetAll(){
  if(!resetArmed){ resetArmed = true; toast("Sicher? Nochmal tippen löscht ALLES."); setTimeout(()=>resetArmed=false, 3000); return; }
  S = defaultState(); save(); pushAll(); toast("Alles zurückgesetzt"); render();
}

/* ================= RENDER ================= */
function render(){
  setNav();
  if(curView==="today") renderToday();
  else if(curView==="week") renderWeek();
  else if(curView==="progress") renderProgress();
  else if(curView==="shop") renderShop();
  else if(curView==="more") renderMore();
}
render();
cloudInit();
</script>
</body>
</html>
